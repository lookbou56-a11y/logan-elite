<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logan Elite</title>

<style>
body {
  margin: 0;
  background: black;
  color: #0ff;
  font-family: monospace;
  text-align: center;
}

h1 {
  text-shadow: 0 0 10px #0ff;
  font-size: 40px;
}

.container {
  margin-top: 100px;
}

input {
  padding: 12px;
  margin: 10px;
  width: 260px;
  border: none;
  border-radius: 5px;
  background: #111;
  color: #0ff;
  font-size: 18px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 5px;
  background: #0ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 18px;
}

button:hover {
  background: #00cccc;
}
</style>
</head>

<body>

<div class="container">
  <h1>LOGAN ELITE 🚀</h1>

  <input type="email" id="email" placeholder="Enter email"><br>
  <input type="password" id="password" placeholder="Enter password"><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>

  <br><br>

  <a href="https://wa.me/231887935222?text=Hello%20Logan" target="_blank">
    <button>Contact Me</button>
  </a>
</div>

<!-- FIREBASE (WORKING VERSION) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDXJGWNMuTu7Oob8dSdZj5QBEP4ghvkQ8A",
  authDomain: "logan-elite-2e9c4.firebaseapp.com",
  projectId: "logan-elite-2e9c4"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.firestore();

// SIGN UP
function signup() {
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Enter email & password ⚠️");
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(function() {
      db.collection("users").add({
        email: email
      });
      alert("Account created ✅");
    })
    .catch(function(error) {
      alert(error.message);
    });
}

// LOGIN
function login() {
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(function() {
      alert("Login successful 🔥");
    })
    .catch(function(error) {
      alert(error.message);
    });
}
</script>

</body>
</html>
