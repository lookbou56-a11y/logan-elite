
<!DOCTYPE html>
<html>
<head>
<title>LOGAN SOCIAL</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0a0a0a; color:white; }

.container { display:flex; height:100vh; }

/* USERS */
.sidebar {
  width:30%;
  border-right:1px solid cyan;
  overflow-y:auto;
}

.user {
  padding:15px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.user:hover { background:#111; }

/* CHAT */
.chatArea {
  width:70%;
  display:flex;
  flex-direction:column;
}

#chatBox {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg {
  margin:5px;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.me { background:cyan; color:black; margin-left:auto; }
.other { background:#222; }

input { padding:10px; margin:5px; width:80%; }
button { padding:10px; background:cyan; border:none; }

/* STATUS */
#statusBox { display:flex; overflow-x:auto; padding:10px; border-bottom:1px solid cyan; }
.status { margin:5px; padding:10px; background:#222; border-radius:10px; }

#loginPage { text-align:center; margin-top:50px; }
#app { display:none; }
</style>
</head>

<body>

<div id="loginPage">
<h2>LOGAN SOCIAL 🔐</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="app">

<!-- STATUS -->
<div id="statusBox"></div>
<input id="statusText" placeholder="Status...">
<input type="file" id="statusImg">
<button onclick="postStatus()">Post</button>

<div class="container">

<!-- USERS -->
<div class="sidebar">
<h3>Users</h3>
<div id="usersList"></div>
</div>

<!-- CHAT -->
<div class="chatArea">
<h3 id="chatWith">Select a user</h3>

<div id="chatBox"></div>

<input id="msg" placeholder="Message...">
<button onclick="sendMsg()">Send</button>

<button onclick="logout()">Logout</button>
</div>

</div>

</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDXJGWNMuTu7Oob8dSdZj5QBEP4ghvkQ8A",
  authDomain: "logan-elite-2e9c4.firebaseapp.com",
  projectId: "logan-elite-2e9c4",
  storageBucket: "logan-elite-2e9c4.appspot.com"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.firestore();
var storage = firebase.storage();

let currentUser, chatUser;

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    loginPage.style.display="none";
    app.style.display="block";

    db.collection("users").doc(user.uid).set({
      email:user.email,
      online:true
    });

    loadUsers();
    loadStatus();
  } else {
    loginPage.style.display="block";
    app.style.display="none";
  }
});

// SIGNUP / LOGIN
function signup(){ auth.createUserWithEmailAndPassword(email.value,password.value); }
function login(){ auth.signInWithEmailAndPassword(email.value,password.value); }

// LOGOUT
function logout(){
  db.collection("users").doc(currentUser.uid).update({online:false});
  auth.signOut();
}

// USERS LIST
function loadUsers(){
  db.collection("users").onSnapshot(s=>{
    usersList.innerHTML="";
    s.forEach(doc=>{
      let u=doc.data();
      if(doc.id!==currentUser.uid){
        usersList.innerHTML+=`
        <div class="user" onclick="openChat('${doc.id}','${u.email}')">
        🟢 ${u.email}
        </div>`;
      }
    });
  });
}

// OPEN CHAT
function openChat(uid,email){
  chatUser=uid;
  chatWith.innerText="Chat with "+email;
  loadMessages();
}

// SEND DM
function sendMsg(){
  if(!chatUser || !msg.value) return;

  db.collection("privateMessages").add({
    text:msg.value,
    from:currentUser.uid,
    to:chatUser,
    time:Date.now()
  });

  msg.value="";
}

// LOAD DM
function loadMessages(){
  db.collection("privateMessages").orderBy("time")
  .onSnapshot(s=>{
    chatBox.innerHTML="";
    s.forEach(doc=>{
      let d=doc.data();

      if(
        (d.from===currentUser.uid && d.to===chatUser) ||
        (d.from===chatUser && d.to===currentUser.uid)
      ){
        chatBox.innerHTML+=`
        <div class="msg ${d.from===currentUser.uid?'me':'other'}">
        ${d.text}
        </div>`;
      }
    });
    chatBox.scrollTop=chatBox.scrollHeight;
  });
}

// STATUS IMAGE
function postStatus(){
  let file=statusImg.files[0];

  if(file){
    let ref=storage.ref("status/"+Date.now());
    ref.put(file).then(()=>{
      ref.getDownloadURL().then(url=>saveStatus(url));
    });
  } else saveStatus("");
}

function saveStatus(img){
  db.collection("status").add({
    text:statusText.value,
    img:img,
    user:currentUser.email,
    time:Date.now()
  });
  statusText.value="";
}

// LOAD STATUS
function loadStatus(){
  db.collection("status").onSnapshot(s=>{
    statusBox.innerHTML="";
    let now=Date.now();

    s.forEach(doc=>{
      let d=doc.data();
      if(now-d.time<86400000){
        statusBox.innerHTML+=`
        <div class="status">
        <b>${d.user}</b><br>
        ${d.text}<br>
        ${d.img?'<img src="'+d.img+'" width="80">':''}
        </div>`;
      }
    });
  });
}
</script>

</body>
</html>
