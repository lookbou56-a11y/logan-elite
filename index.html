<!DOCTYPE html>
<html>
<head>
  <title>LOGAN ELITE CHAT</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      background: black;
      color: cyan;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-top: 20px;
    }

    #chatBox {
      width: 90%;
      height: 400px;
      margin: 20px auto;
      border: 2px solid cyan;
      overflow-y: scroll;
      padding: 10px;
      text-align: left;
      font-size: 18px;
    }

    .msg {
      margin: 10px 0;
    }

    .me {
      color: lime;
      text-align: right;
    }

    .other {
      color: white;
      text-align: left;
    }

    input {
      padding: 12px;
      font-size: 18px;
      width: 60%;
    }

    button {
      padding: 12px;
      font-size: 18px;
      background: cyan;
      border: none;
      margin: 5px;
    }

    #auth {
      margin-top: 50px;
    }
  </style>
</head>

<body>

<h1>🔥 LOGAN ELITE CHAT</h1>

<div id="auth">
  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="chat" style="display:none;">
  <h2 id="userEmail"></h2>

  <div id="chatBox"></div>

  <input type="text" id="message" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button><br><br>

  <button onclick="logout()">Logout</button>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDXJGWNMuTu7Oob8dSdZj5QBEP4ghvkQ8A",
  authDomain: "logan-elite-2e9c4.firebaseapp.com",
  projectId: "logan-elite-2e9c4",
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.firestore();


// SIGNUP
function signup() {
  var email = email.value;
  var password = password.value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Account created ✅"))
    .catch(e => alert(e.message));
}


// LOGIN
function login() {
  var email = email.value;
  var password = password.value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {})
    .catch(e => alert(e.message));
}


// LOGOUT
function logout() {
  auth.signOut();
}


// AUTH STATE
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("chat").style.display = "block";
    document.getElementById("userEmail").innerText = user.email;

    loadMessages();
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("chat").style.display = "none";
  }
});


// SEND MESSAGE
function sendMessage() {
  var msg = document.getElementById("message").value;

  if (msg === "") return;

  db.collection("messages").add({
    text: msg,
    user: auth.currentUser.email,
    time: Date.now()
  });

  document.getElementById("message").value = "";
}


// LOAD REALTIME MESSAGES
function loadMessages() {
  db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {

      var chatBox = document.getElementById("chatBox");
      chatBox.innerHTML = "";

      snapshot.forEach(doc => {
        var data = doc.data();

        var div = document.createElement("div");
        div.classList.add("msg");

        if (data.user === auth.currentUser.email) {
          div.classList.add("me");
        } else {
          div.classList.add("other");
        }

        div.innerHTML = "<b>" + data.user + ":</b> " + data.text;

        chatBox.appendChild(div);
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    });
}
</script>

</body>
</html>
