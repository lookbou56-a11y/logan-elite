<!DOCTYPE html>
<html>
<head>
  <title>LOGAN ELITE</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
    }

    h1 {
      font-size: 35px;
      color: cyan;
    }

    input {
      width: 250px;
      padding: 12px;
      margin: 10px;
      font-size: 18px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 18px;
      background: cyan;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #00bcd4;
    }
  </style>
</head>

<body>

<h1>LOGAN ELITE 🔐</h1>

<input type="email" id="email" placeholder="Enter Email"><br>
<input type="password" id="password" placeholder="Enter Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<br>
<button onclick="contactAdmin()">Contact Admin</button>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyDXJGWNMuTu7Oob8dSdZj5QBEP4ghvkQ8A",
    authDomain: "logan-elite-2e9c4.firebaseapp.com",
    projectId: "logan-elite-2e9c4"
  };

  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();

  function signup() {
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(function() {
        alert("Account created ✅");
      })
      .catch(function(error) {
        alert(error.message);
      });
  }

  function login() {
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(function() {
        alert("Login successful 🔥");
      })
      .catch(function(error) {
        alert(error.message);
      });
  }

  function contactAdmin() {
    window.location.href = "https://wa.me/231887935222";
  }
</script>

</body>
</html>
